 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zainab Ahmed | AI Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background: #010410; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Orbitron', sans-serif; }

        /* شاشة الدخول (مبرمجين) */
        #loader { position: fixed; inset: 0; background: #010410; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeOut 0.5s 2s forwards; }
        .code-load { color: #00f2ff; font-size: 14px; margin-bottom: 10px; animation: blink 0.2s infinite; }

        /* الخلفية والاطارات (نفس الصور بالضبط) */
        .hud-bg { position: absolute; width: 300px; height: 300px; border: 2px solid rgba(0, 242, 255, 0.2); border-radius: 50%; animation: rotate 10s linear infinite; }
        .hud-lines { position: absolute; width: 350px; height: 350px; border: 1px dashed rgba(191, 0, 255, 0.3); border-radius: 50%; animation: rotate 15s linear infinite reverse; }
        .chip-frame { position: absolute; width: 320px; height: 320px; border: 1px solid #00f2ff; box-shadow: 0 0 20px #bf00ff inset; opacity: 0.5; }

        /* حاوية الاسم */
        .name-box { position: relative; z-index: 10; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        /* الاسم 3D ونبض */
        .char {
            font-size: clamp(35px, 8vw, 80px); color: #00f2ff;
            text-shadow: 2px 2px 0 #005f66, 4px 4px 0 #00333d, 0 0 30px rgba(0,242,255,0.8);
            opacity: 0; transform: scale(0);
            animation: pulseEmerge 0.6s cubic-bezier(0.17, 0.88, 0.32, 1.2) forwards;
        }

        /* توقيت الحروف يبدأ بعد الدخولية */
        .char:nth-child(1) { animation-delay: 2.1s; } .char:nth-child(2) { animation-delay: 2.2s; }
        .char:nth-child(3) { animation-delay: 2.3s; } .char:nth-child(4) { animation-delay: 2.4s; }
        .char:nth-child(5) { animation-delay: 2.5s; } .char:nth-child(6) { animation-delay: 2.6s; }
        .char:nth-child(8) { animation-delay: 2.7s; } .char:nth-child(9) { animation-delay: 2.8s; }
        .char:nth-child(10) { animation-delay: 2.9s; } .char:nth-child(11) { animation-delay: 3.0s; }
        .char:nth-child(12) { animation-delay: 3.1s; }

        @keyframes pulseEmerge { to { opacity: 1; transform: scale(1); } }
        @keyframes rotate { from { transform: rotate(0); } to { transform: rotate(360deg); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="code-load">> ACCESSING_CORE...</div>
        <div class="code-load">> DECRYPTING_BIOMETRICS...</div>
    </div>

    <div class="hud-bg"></div>
    <div class="hud-lines"></div>
    <div class="chip-frame"></div>

    <div class="name-box">
        <span class="char">Z</span><span class="char">A</span><span class="char">I</span><span class="char">N</span><span class="char">A</span><span class="char">B</span>
        <span style="width:15px"></span>
        <span class="char">A</span><span class="char">H</span><span class="char">M</span><span class="char">E</span><span class="char">D</span>
    </div>

</body>
</html>
