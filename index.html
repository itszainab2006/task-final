 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zainab Ahmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #3b2a50; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Caveat', cursive;
            overflow: hidden;
            position: relative;
        }

        .name-box {
            background-color: #5b447a; 
            padding: 40px 80px;
            border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 2px solid #7c5da1;
            text-align: center;
            z-index: 2;
            animation: floatBox 4s ease-in-out infinite alternate;
        }

        /* تأثير ظهور الحروف */
        .typing-name {
            display: inline-block;
            color: #ffffff;
            font-size: 110px;
            margin: 0;
            white-space: nowrap;
            overflow: hidden; /* يخفي الحروف قبل ظهورها */
            border-right: 4px solid #f3d47a; /* الخط اللي ينبض مثل الكتابة */
            width: 0;
            animation: typing 3.5s steps(12, end) forwards, blink-caret 0.8s infinite;
        }

        .symbols-inside {
            font-size: 40px;
            margin-top: 10px;
            opacity: 0;
            animation: fadeIn 1s ease-in forwards;
            animation-delay: 3.5s; /* تظهر الرموز بعد انتهاء كتابة الاسم */
        }

        .star {
            position: absolute;
            color: #f3d47a;
            font-size: 25px;
            animation: twinkle 2s infinite ease-in-out;
            z-index: 1;
        }

        /* حركات الأنيميشن */
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: #f3d47a; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes floatBox {
            from { transform: translateY(0); }
            to { transform: translateY(-25px); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.4); }
        }
    </style>
</head>
<body>

    <div class="star" style="top:15%; left:20%;">★</div>
    <div class="star" style="top:10%; right:20%;">✨</div>
    <div class="star" style="bottom:20%; left:15%;">⭐</div>
    <div class="star" style="bottom:15%; right:15%;">★</div>

    <div class="name-box">
        <h1 class="typing-name">Zainab Ahmed</h1>
        <div class="symbols-inside">✨🌸✨</div>
    </div>

</body>
</html>
