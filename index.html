 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZAINAB AHMED</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        /* إعدادات الخلفية والرسوم التقنية */
        body {
            background-color: #010410;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            color: #00f2ff;
        }

        /* رسوم الذكاء الاصطناعي (الخلفية النيونية) */
        .ai-circuit {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at center, rgba(0, 242, 255, 0.15) 0%, transparent 70%),
                repeating-linear-gradient(rgba(0, 242, 255, 0.05) 0px, rgba(0, 242, 255, 0.05) 1px, transparent 1px, transparent 30px);
            z-index: 1;
        }

        /* الدوائر المتحركة حول الاسم */
        .hud-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0, 242, 255, 0.2);
            z-index: 2;
        }
        .inner { width: 260px; height: 260px; border-top: 3px solid #00f2ff; animation: rotate 6s linear infinite; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
        .outer { width: 310px; height: 310px; border-left: 2px dashed #bf00ff; animation: rotate 10s linear infinite reverse; }

        /* شاشة دخول مبرمجين سريعة جداً */
        #boot-screen {
            position: fixed; inset: 0; background: #010410; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            animation: fadeOut 0.4s 1.5s forwards;
        }
        .boot-msg { letter-spacing: 5px; font-size: 10px; animation: flash 0.3s infinite; }

        /* حاوية الاسم - التعديل الأساسي للتليفون */
        .name-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-wrap: wrap; /* يسمح للاسم بالنزول لسطر ثاني إذا كان التليفون صغيراً جداً */
            justify-content: center;
            align-items: center;
            width: 95%; /* لضمان عدم ملامسة حواف الشاشة */
            gap: 4px; 
        }

        /* الاسم 3D ونبض */
        .char {
            /* حجم خط مرن جداً ليناسب الموبايل الصغير والكبير */
            font-size: clamp(24px, 7.8vw, 65px); 
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 
                2px 2px 0 #005f66, 
                4px 4px 0 #00333d, 
                0 0 20px rgba(0, 242, 255, 0.8);
            opacity: 0;
            transform: scale(0);
            animation: pulseIn 0.6s cubic-bezier(0.17, 0.88, 0.32, 1.2) forwards;
        }

        /* تسلسل نبض الحروف */
        .char:nth-child(n) { animation-delay: calc(1.6s + (0.07s * var(--i))); }

        @keyframes rotate { from { transform: rotate(0); } to { transform: rotate(360deg); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes flash { 50% { opacity: 0; } }
        @keyframes pulseIn { to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="boot-screen"><div class="boot-msg">CORE_INTERFACE_ONLINE</div></div>

    <div class="ai-circuit"></div>
    <div class="hud-ring inner"></div>
    <div class="hud-ring outer"></div>

    <div class="name-container">
        <span class="char" style="--i:1">Z</span>
        <span class="char" style="--i:2">A</span>
        <span class="char" style="--i:3">I</span>
        <span class="char" style="--i:4">N</span>
        <span class="char" style="--i:5">A</span>
 <span class="char" style="--i:6">B</span>
        <span style="width:10px"></span> <span class="char" style="--i:7">A</span>
        <span class="char" style="--i:8">H</span>
        <span class="char" style="--i:9">M</span>
        <span class="char" style="--i:10">E</span>
        <span class="char" style="--i:11">D</span>
    </div>

</body>
</html>
