<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zainab Ahmed | Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@500&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117; /* أسود المبرمجين (GitHub Dark) */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            color: #00ff9d; /* الأخضر البرمجي */
        }

        /* رموز تسبح في الخلفية */
        .bg-symbols {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.1;
            font-size: 20px;
        }

        /* صندوق البرمجة (Terminal) */
        .terminal {
            background-color: #161b22;
            border: 2px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.1);
            z-index: 2;
            position: relative;
        }

        /* أزرار النافذة (أحمر، أصفر، أخضر) */
        .dots {
            position: absolute;
            top: 15px; left: 15px;
            display: flex; gap: 8px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .code-text {
            font-size: 60px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid #00ff9d;
            width: 0;
            animation: typing 3s steps(12, end) forwards, blink 0.7s infinite;
        }

        .tag { color: #58a6ff; } /* أزرق برمجيات */
        .bracket { color: #d29922; } /* برتقالي برمجيات */

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* حركة الرموز في الخلفية */
        .float-symbol {
            position: absolute;
            animation: moveAround 20s linear infinite;
        }

        @keyframes moveAround {
            from { transform: translateY(100vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="bg-symbols">
        <span class="float-symbol" style="left: 10%; animation-delay: 0s;">{ }</span>
        <span class="float-symbol" style="left: 30%; animation-delay: 5s;">&lt;/&gt;</span>
        <span class="float-symbol" style="left: 60%; animation-delay: 2s;">01</span>
        <span class="float-symbol" style="left: 80%; animation-delay: 8s;">[ ]</span>
    </div>

    <div class="terminal">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="code-text">
            <span class="bracket">&lt;</span><span class="tag">Zainab Ahmed</span><span class="bracket"> /&gt;</span>
        </div>
    </div>

</body>
</html>
