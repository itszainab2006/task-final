 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zainab Ahmed | Final HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #010410 !important;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* رموز برمجية ودوائر تقنية في الخلفية */
        .bg-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15;
            background-image: radial-gradient(circle at center, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .name-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: clamp(5px, 2vw, 15px);
            z-index: 10;
            width: 95%;
        }

        /* الحرف مع تأثير المكعبات والنبض */
        .char {
            color: #00f2ff;
            font-size: clamp(35px, 10vw, 90px);
            display: inline-block;
            text-transform: uppercase;
            /* تأثير 3D العميق */
            text-shadow: 
                2px 2px 0px #005f66,
                4px 4px 0px #00333d,
                0 0 20px rgba(0, 242, 255, 0.5);
            
            opacity: 0;
            transform: scale(0.5);
            /* حركة النبض والظهور */
            animation: pulseAppear 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* توقيت الحروف - تظهر واحد تلو الآخر بنبضة */
        .char:nth-child(1) { animation-delay: 0.2s; }
        .char:nth-child(2) { animation-delay: 0.4s; }
        .char:nth-child(3) { animation-delay: 0.6s; }
        .char:nth-child(4) { animation-delay: 0.8s; }
        .char:nth-child(5) { animation-delay: 1.0s; }
        .char:nth-child(6) { animation-delay: 1.2s; }
        .char:nth-child(7) { animation-delay: 1.4s; } /* مسافة */
        .char:nth-child(8) { animation-delay: 1.6s; }
        .char:nth-child(9) { animation-delay: 1.8s; }
        .char:nth-child(10) { animation-delay: 2.0s; }
        .char:nth-child(11) { animation-delay: 2.2s; }
        .char:nth-child(12) { animation-delay: 2.4s; }

        @keyframes pulseAppear {
            0% { opacity: 0; transform: scale(0.5) translateY(20px); filter: blur(10px); }
            70% { opacity: 1; transform: scale(1.2) translateY(0); filter: blur(0); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* عناصر تزيين برمجية */
        .decor {
            position: absolute;
            color: rgba(0, 242, 255, 0.3);
            font-size: 12px;
            animation: blink 2s infinite;
        }
        @keyframes blink { 50% { opacity: 0.1; } }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    
    <div class="decor" style="top: 20%; left: 5%;">[ LOADING... ]</div>
    <div class="decor" style="bottom: 20%; right: 5%;">[ SYSTEM ACTIVE ]</div>

    <div class="name-container">
        <span class="char">Z</span>
        <span class="char">A</span>
        <span class="char">I</span>
        <span class="char">N</span>
        <span class="char">A</span>
        <span class="char">B</span>
        <span class="char" style="width: 15px;"></span> <span class="char">A</span>
        <span class="char">H</span>
        <span class="char">M</span>
        <span class="char">E</span>
        <span class="char">D</span>
    </div>

</body>
</html>
