        .content {

        /* النجوم الصغيرة العائمة */
        .star {
            position: absolute;
            color: #f3d47a; /* لون النجوم الذهبي */
            font-size: 15px;
            animation: twinkle 2s infinite ease-in-out;
        }

        /* زينة الأغصان تحت الاسم */
        .decoration {
            color: #d1b3c4;
            font-size: 40px;
            margin-top: -20px;
            opacity: 0.8;
        }

        /* حركات الأنيميشن */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }
    </style>
