 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zainab Ahmed | Neural Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        /* إعدادات الصفحة الأساسية */
        body {
            background-color: #010410; /* نفس خلفية الصورة */
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
        }

        /* رسوم الـ HUD (الدوائر والخطوط مثل صورة الـ AI) */
        .hud-graphic {
            position: absolute;
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }
        .ring-1 { width: 350px; height: 350px; border-top: 4px solid #00f2ff; animation: rotate 8s linear infinite; }
        .ring-2 { width: 400px; height: 400px; border-left: 2px dashed #bf00ff; animation: rotate 12s linear infinite reverse; }

        /* دخولية المبرمجين السريعة */
        #intro-overlay {
            position: fixed; inset: 0; background: #010410; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            animation: fadeOut 0.5s 2s forwards;
        }
        .boot-text { color: #00f2ff; font-size: 14px; letter-spacing: 5px; animation: blink 0.4s infinite; }

        /* حاوية الاسم */
        .name-wrapper { position: relative; z-index: 10; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }

        /* تأثير الاسم 3D والنبض */
        .char {
            color: #00f2ff;
            font-size: clamp(40px, 10vw, 90px);
            text-shadow: 
                2px 2px 0 #005f66, 
                4px 4px 0 #00333d, 
                0 0 25px rgba(0, 242, 255, 0.7);
            opacity: 0; transform: scale(0);
            animation: pulseIn 0.7s cubic-bezier(0.17, 0.88, 0.32, 1.2) forwards;
        }

        /* توقيت الحروف ليظهر النبض حرف حرف */
        .char:nth-child(1) { animation-delay: 2.2s; } .char:nth-child(2) { animation-delay: 2.3s; }
        .char:nth-child(3) { animation-delay: 2.4s; } .char:nth-child(4) { animation-delay: 2.5s; }
        .char:nth-child(5) { animation-delay: 2.6s; } .char:nth-child(6) { animation-delay: 2.7s; }
        .char:nth-child(8) { animation-delay: 2.8s; } .char:nth-child(9) { animation-delay: 2.9s; }
        .char:nth-child(10) { animation-delay: 3.0s; } .char:nth-child(11) { animation-delay: 3.1s; }
        .char:nth-child(12) { animation-delay: 3.2s; }

        @keyframes rotate { from { transform: rotate(0); } to { transform: rotate(360deg); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes pulseIn { to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="intro-overlay"><div class="boot-text">BOOTING_CORE_INTERFACE...</div></div>

    <div class="hud-graphic ring-1"></div>
    <div class="hud-graphic ring-2"></div>

    <div class="name-wrapper">
        <span class="char">Z</span><span class="char">A</span><span class="char">I</span><span class="char">N</span><span class="char">A</span><span class="char">B</span>
        <span style="width:20px"></span>
        <span class="char">A</span><span class="char">H</span><span class="char">M</span><span class="char">E</span><span class="char">D</span>
    </div>

</body>
</html>
