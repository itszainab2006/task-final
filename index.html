<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zainab Ahmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Delius+Unicase:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f3e8ff; /* خلفية بنفسجي فاتح جداً (Lavender) */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Delius Unicase', cursive;
            overflow: hidden;
        }
        
        .cloud-wrapper {
            position: relative;
            /* حركة الدخول والاستقرار */
            animation: dropIn 1.5s ease-out forwards;
        }
        
        .scalloped-cloud {
            background-color: white;
            padding: 60px 110px;
            text-align: center;
            position: relative;
            
            /* --- تصميم الغيمة المزكزكة --- */
            border-radius: 200px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.06);
            border: 8px solid #c084fc; /* إطار بنفسجي غامق قليلاً يمثل الزكزكة */
            
            /* حركة الطوفان الخفيف للأبد */
            animation: floatCloud 4s ease-in-out infinite alternate;
            animation-delay: 1.5s; /* تبدأ بعد الاستقرار */
        }
        
        h1 {
            color: #f59e0b; /* لون أصفر ذهبي جذاب جداً للاسم */
            font-size: 85px; /* تكبير الاسم ليبرز */
            margin: 0;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1); /* ظل خفيف لإبراز الأصفر */
        }
        
        p {
            color: #7e22ce; /* لون بنفسجي غامق للعبارة */
            font-size: 20px;
            margin-top: 5px;
            font-weight: 400;
        }

        /* --- الأكواد البرمجية للحركة (Keyframes) --- */
        
        /* 1. حركة الدخول والاستقرار */
        @keyframes dropIn {
            0% { transform: translateY(-200px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        /* 2. حركة التأرجح العائم */
        @keyframes floatCloud {
            0% { transform: translateY(0); }
            100% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="cloud-wrapper">
        <div class="scalloped-cloud">
            <h1>Zainab Ahmed</h1>
            <p>Student Name</p> 
        </div>
    </div>
</body>
</html>
