 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zainab Ahmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background: #010410; color: #00f2ff; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* شاشة الدخول السريعة */
        #intro { position: fixed; inset: 0; background: #010410; z-index: 100; display: flex; align-items: center; justify-content: center; animation: fadeOut 0.5s 1.5s forwards; }
        .loading { border: 2px solid #00f2ff; padding: 10px 20px; animation: blink 0.5s infinite; }

        .name-container { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        
        /* الاسم 3D ونبض من الوسط */
        .char { 
            font-size: clamp(40px, 10vw, 80px); opacity: 0; transform: scale(0);
            text-shadow: 2px 2px 0 #005f66, 4px 4px 0 #00333d, 0 0 20px rgba(0,242,255,0.5);
            animation: pulse 0.6s cubic-bezier(0.17, 0.88, 0.32, 1.27) forwards;
        }

        /* توقيت الحروف بعد الدخولية */
        .char:nth-child(1) { animation-delay: 1.6s; } .char:nth-child(2) { animation-delay: 1.7s; }
        .char:nth-child(3) { animation-delay: 1.8s; } .char:nth-child(4) { animation-delay: 1.9s; }
        .char:nth-child(5) { animation-delay: 2.0s; } .char:nth-child(6) { animation-delay: 2.1s; }
        .char:nth-child(8) { animation-delay: 2.2s; } .char:nth-child(9) { animation-delay: 2.3s; }
        .char:nth-child(10) { animation-delay: 2.4s; } .char:nth-child(11) { animation-delay: 2.5s; }
        .char:nth-child(12) { animation-delay: 2.6s; }

        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes pulse { to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="intro"><div class="loading">SYSTEM LOADING...</div></div>

    <div class="name-container">
        <span class="char">Z</span><span class="char">A</span><span class="char">I</span><span class="char">N</span><span class="char">A</span><span class="char">B</span>
        <span style="width:20px"></span>
        <span class="char">A</span><span class="char">H</span><span class="char">M</span><span class="char">E</span><span class="char">D</span>
    </div>

</body>
</html>
