 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zainab Ahmed | AI Logic</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #010410;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            color: #00f2ff;
        }

        /* رسوم الذكاء الاصطناعي (الدوائر والخطوط الدقيقة) */
        .ai-elements {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.4;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.1) 0%, transparent 60%),
                repeating-linear-gradient(rgba(0, 242, 255, 0.03) 0px, rgba(0, 242, 255, 0.03) 1px, transparent 1px, transparent 30px);
        }

        .hud-circle {
            position: absolute;
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 50%;
            animation: spin 10s linear infinite;
        }
        /* دوائر تشبه الصورة */
        .c1 { width: 280px; height: 280px; border-top: 3px solid #00f2ff; box-shadow: 0 0 15px #00f2ff; }
        .c2 { width: 310px; height: 310px; border-right: 2px dashed #bf00ff; animation-duration: 15s; }

        /* شاشة الدخول */
        #boot {
            position: fixed; inset: 0; background: #010410; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            animation: fadeOut 0.5s 1.5s forwards;
        }

        /* حاوية الاسم - محسنة للموبايل */
        .name-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px; /* تقليل المسافة ليناسب العرض */
            width: 90%; /* لضمان عدم خروجه من الشاشة */
        }

        /* الاسم 3D ونبض */
        .char {
            font-size: clamp(28px, 7vw, 60px); /* تصغير الخط ليظهر كاملاً في التليفون */
            text-transform: uppercase;
            text-shadow: 2px 2px 0 #005f66, 4px 4px 0 #00333d, 0 0 15px rgba(0,242,255,0.6);
            opacity: 0; transform: scale(0);
            animation: pulseIn 0.6s cubic-bezier(0.17, 0.88, 0.32, 1.2) forwards;
        }

        /* توقيت الحروف */
        .char:nth-child(n) { animation-delay: calc(1.6s + (0.1s * var(--i))); }

        @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes pulseIn { to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="boot">INITIALIZING AI_CORE...</div>

    <div class="ai-elements"></div>
    <div class="hud-circle c1"></div>
    <div class="hud-circle c2"></div>

    <div class="name-container">
        <span class="char" style="--i:1">Z</span>
        <span class="char" style="--i:2">A</span>
        <span class="char" style="--i:3">I</span>
        <span class="char" style="--i:4">N</span>
        <span class="char" style="--i:5">A</span>
        <span class="char" style="--i:6">B</span>
        <span style="width:10px"></span>
        <span class="char" style="--i:7">A</span>
        <span class="char" style="--i:8">H</span>
        <span class="char" style="--i:9">M</span>
        <span class="char" style="--i:10">E</span>
        <span class="char" style="--i:11">D</span>
    </div>

</body>
</html>
