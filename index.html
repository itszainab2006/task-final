 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zainab Ahmed | Tech Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #080a0f; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* خلفية الرموز البرمجية العائمة */
        .bg-symbols {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.1;
            color: #00d4ff;
            font-size: 1.5rem;
            pointer-events: none;
        }

        .symbol {
            position: absolute;
            animation: drift 10s infinite linear;
        }

        /* حاوية الاسم */
        .name-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 15px; /* المسافة بين الحروف */
        }

        /* تصميم كل حرف ليظهر من الوسط */
        .char {
            display: inline-block;
            color: #00d4ff;
            font-size: 100px;
            text-transform: uppercase;
            /* تأثير المكعبات والبروز */
            text-shadow: 
                2px 2px 0px #005666,
                4px 4px 0px #00333d;
            
            /* حركة الانبثاق من الوسط */
            opacity: 0;
            transform: scale(0);
            animation: emergeFromCenter 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* توقيت ظهور كل حرف (تأخير بسيط ليعطي شكل متسلسل) */
        .char:nth-child(1) { animation-delay: 0.1s; }
        .char:nth-child(2) { animation-delay: 0.2s; }
        .char:nth-child(3) { animation-delay: 0.3s; }
        .char:nth-child(4) { animation-delay: 0.4s; }
        .char:nth-child(5) { animation-delay: 0.5s; }
        .char:nth-child(6) { animation-delay: 0.6s; }
        .char:nth-child(7) { animation-delay: 0.7s; } /* مسافة */
        .char:nth-child(8) { animation-delay: 0.8s; }
        .char:nth-child(9) { animation-delay: 0.9s; }
        .char:nth-child(10) { animation-delay: 1.0s; }
        .char:nth-child(11) { animation-delay: 1.1s; }
        .char:nth-child(12) { animation-delay: 1.2s; }

        @keyframes emergeFromCenter {
            0% { opacity: 0; transform: scale(0); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        @keyframes drift {
            from { transform: translateY(100vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="bg-symbols">
        <span class="symbol" style="left: 10%; top: 20%;">{ }</span>
        <span class="symbol" style="left: 80%; top: 50%;">&lt;/&gt;</span>
        <span class="symbol" style="left: 40%; top: 80%;">[ ]</span>
        <span class="symbol" style="left: 70%; top: 10%;">01</span>
    </div>

    <div class="name-wrapper">
        <span class="char">Z</span>
        <span class="char">A</span>
        <span class="char">I</span>
        <span class="char">N</span>
        <span class="char">A</span>
        <span class="char">B</span>
        <span class="char" style="width: 30px;"></span> <span class="char">A</span>
        <span class="char">H</span>
        <span class="char">M</span>
        <span class="char">E</span>
        <span class="char">D</span>
    </div>

</body>
</html>
