<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zainab Ahmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Delius+Unicase:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #e9d5ff; /* خلفية بنفسجي فاتح جداً (خزامي) */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Delius Unicase', cursive;
            overflow: hidden; /* لمنع ظهور أشرطة التمرير */
        }
        
        .floating-cloud {
            background-color: white; /* الغيمة البيضاء الناعمة */
            padding: 60px 100px;
            text-align: center;
            border-radius: 150px; /* شكل الغيمة الدائري الناعم */
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); /* ظل ناعم لإبرازها */
            position: relative;
            
            /* --- حركة الطوفان العائم للأبد --- */
            animation: floatCloud 4s ease-in-out infinite alternate;
        }
        
        h1 {
            color: #7e22ce; /* لون بنفسجي غامق للاسم (أنيق وواضح) */
            font-size: 85px; /* تكبير الاسم ليبرز */
            margin: 0;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05); /* ظل خفيف جداً */
        }

        /* --- الكود البرمجي لحركة التأرجح العائم --- */
        @keyframes floatCloud {
            0% { transform: translateY(0); }
            100% { transform: translateY(-20px); } /* ترتفع قليلاً للأعلى */
        }
    </style>
</head>
<body>
    <div class="floating-cloud">
        <h1>Zainab Ahmed</h1>
    </div>
</body>
</html>
