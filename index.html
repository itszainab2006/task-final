<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zainab Ahmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f3e8ff !important; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }
        .cloud {
            background: white;
            padding: 50px 80px;
            border-radius: 120px;
            border: 8px dashed #c084fc; /* الزكزكة البنفسجية */
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            text-align: center;
            animation: float 3s ease-in-out infinite alternate;
        }
        h1 {
            color: #f59e0b !important; /* اسم أصفر ذهبي */
            font-size: 65px;
            margin: 0;
            text-transform: uppercase; /* هذا السطر يخلي كل الحروف كابيتال غصباً عليها */
            letter-spacing: 2px;
        }
        p {
            color: #7e22ce;
            margin-top: 10px;
            font-size: 18px;
            text-transform: uppercase; /* حتى Student Name تصير كبيرة */
            font-weight: 300;
        }
        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(-25px); }
        }
    </style>
</head>
<body>
    <div class="cloud">
        <h1>Zainab Ahmed</h1>
        <p>Student Name</p>
    </div>
</body>
</html>
