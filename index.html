 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zainab Ahmed | 3D Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505; /* أسود أعمق */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        /* الصندوق البرمجي بزوايا حادة */
        .terminal-box {
            background-color: #111;
            padding: 50px 80px;
            border: 2px solid #00ff9d;
            border-radius: 4px; /* زوايا حادة لستايل المبرمجين */
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.2);
            position: relative;
        }

        /* تأثير الاسم حرف بحرف مع مكعبات */
        .typing-name {
            color: #00ff9d;
            font-size: 75px;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            display: block;
            /* تأثير الـ 3D المكعب */
            text-shadow: 
                3px 3px 0px #005f3a,
                5px 5px 0px #003320;
            /* أنيميشن الكتابة */
            width: 0;
            border-right: 4px solid #00ff9d;
            animation: typing 3s steps(12, end) forwards, blink 0.7s infinite;
        }

        /* حركة الرموز البرمجية في الخلفية بنعومة */
        .bg-code {
            position: absolute;
            color: #00ff9d;
            opacity: 0.05;
            font-size: 14px;
            width: 100%;
            height: 100%;
            pointer-events: none;
            line-height: 1.5;
            padding: 10px;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>

    <div class="bg-code">
        const dev = "Zainab Ahmed"; <br>
        while(true) { coding(); } <br>
        01010101010101010101 <br>
        system.execute(dream);
    </div>

    <div class="terminal-box">
        <h1 class="typing-name">ZAINAB AHMED</h1>
    </div>

</body>
</html>
