<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zainab Ahmed | Pulsing Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #05070a !important; /* أسود عميق جداً */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* رموز برمجية في الخلفية */
        .bg-symbols {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.1;
            color: #00f2ff;
            pointer-events: none;
        }

        .name-container {
            display: flex;
            flex-wrap: wrap; /* متجاوب مع الموبايل */
            justify-content: center;
            gap: 15px; /* المسافة بين الحروف */
            z-index: 10;
            width: 90%; /* لضمان عدم الخروج عن حواف الهاتف */
        }

        /* تصميم الحرف مع تأثير المكعبات والنبض */
        .char {
            color: #00f2ff; /* أزرق نيوني مضيء */
            font-size: clamp(40px, 8vw, 100px); /* متجاوب مع الموبايل */
            display: inline-block;
            text-shadow: 2px 2px 0px #005f66, 4px 4px 10px rgba(0, 242, 255, 0.3);
            
            /* --- حركة النبض المتسلسلة --- */
            opacity: 0; /* يبدأ مخفيًا */
            transform: scale(0); /* يبدأ بحجم صفر */
            animation: pulseIn 0.8s cubic-bezier(0.4, 0, 0.6, 1) forwards;
        }

        /* توقيت ظهور ونبض كل حرف بالتسلسل */
        .char:nth-child(1) { animation-delay: 0.1s; }
        .char:nth-child(2) { animation-delay: 0.2s; }
        .char:nth-child(3) { animation-delay: 0.3s; }
        .char:nth-child(4) { animation-delay: 0.4s; }
        .char:nth-child(5) { animation-delay: 0.5s; }
        .char:nth-child(6) { animation-delay: 0.6s; }
        .char:nth-child(7) { animation-delay: 0.7s; } /* مسافة */
        .char:nth-child(8) { animation-delay: 0.8s; }
        .char:nth-child(9) { animation-delay: 0.9s; }
        .char:nth-child(10) { animation-delay: 1.0s; }
        .char:nth-child(11) { animation-delay: 1.1s; }
        .char:nth-child(12) { animation-delay: 1.2s; }

        @keyframes pulseIn {
            0% { opacity: 0; transform: scale(0); filter: blur(10px); }
            50% { opacity: 1; transform: scale(1.2); filter: blur(0); } /* ينبض ويكبر */
            100% { opacity: 1; transform: scale(1); filter: blur(0); } /* يثبت على حجمه الطبيعي */
        }

        .floating-symbol {
            position: absolute;
            animation: floatSymbols 12s linear infinite;
        }

        @keyframes floatSymbols {
            from { transform: translateY(110vh); }
            to { transform: translateY(-10vh); }
        }
    </style>
</head>
<body>

    <div class="bg-symbols">
        <span class="floating-symbol" style="left:10%; animation-delay:0s;">{ }</span>
        <span class="floating-symbol" style="left:35%; animation-delay:5s;">&lt;/&gt;</span>
        <span class="floating-symbol" style="left:70%; animation-delay:2s;">01</span>
        <span class="floating-symbol" style="left:85%; animation-delay:8s;">[ ]</span>
    </div>

    <div class="name-container">
        <span class="char">Z</span>
        <span class="char">A</span>
        <span class="char">I</span>
        <span class="char">N</span>
        <span class="char">A</span>
        <span class="char">B</span>
        <span class="char" style="width: 20px;"></span> <span class="char">A</span>
        <span class="char">H</span>
        <span class="char">M</span>
        <span class="char">E</span>
        <span class="char">D</span>
    </div>

</body>
</html>v
