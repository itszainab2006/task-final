 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zainab Ahmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #3b2a50; /* البنفسجي الغامق (مثل الصورة) */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Caveat', cursive;
            overflow: hidden;
            position: relative;
        }

        /* الصندوق الجذاب */
        .name-box {
            background-color: #5b447a; /* بنفسجي أفتح من الخلفية قليلاً */
            padding: 40px 80px;
            border-radius: 30px; /* حواف دائرية أنيقة */
            box-shadow: 0 15px 40px rgba(0,0,0,0.3); /* ظل يعطي عمق للصندوق */
            border: 2px solid #7c5da1; /* إطار ناعم جداً */
            text-align: center;
            z-index: 2;
            /* حركة الطوفان العائمة */
            animation: floatBox 4s ease-in-out infinite alternate;
        }

        h1 {
            color: #ffffff; /* اسمك باللون الأبيض الناصع */
            font-size: 100px;
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(255,255,255,0.2);
        }

        /* الرموز المتحركة حول الصندوق */
        .symbol {
            position: absolute;
            color: #f3d47a; /* لون ذهبي */
            font-size: 25px;
            animation: twinkle 2s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes floatBox {
            from { transform: translateY(0); }
            to { transform: translateY(-25px); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.4); }
        }
    </style>
</head>
<body>

    <div class="symbol" style="top:15%; left:20%;">★</div>
    <div class="symbol" style="top:10%; right:20%;">✨</div>
    <div class="symbol" style="bottom:20%; left:15%;">⭐</div>
    <div class="symbol" style="bottom:15%; right:15%;">★</div>

    <div class="name-box">
        <h1>Zainab Ahmed</h1>
        <div style="font-size: 40px; margin-top: 10px;">✨🌸✨</div>
    </div>

</body>
</html>
